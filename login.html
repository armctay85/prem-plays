<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prem Plays - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0A0A0F; color: #F0F0F0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: #16161F; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 40px; max-width: 400px; width: 100%; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #888899; font-size: 14px; margin-bottom: 30px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #E0E0E0; }
    input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #F0F0F0; font-size: 14px; font-family: inherit; outline: none; }
    input:focus { border-color: #6C3DFF; }
    button { width: 100%; padding: 12px; background: #6C3DFF; color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    button:hover { background: #4B1FE5; }
    .toggle { text-align: center; margin-top: 20px; font-size: 13px; }
    .toggle a { color: #6C3DFF; text-decoration: none; cursor: pointer; }
    .error { color: #FF9800; font-size: 12px; margin-top: 4px; }
    .success { color: #00E676; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>

<div class="login-box">
  <h1>Prem Plays</h1>
  <div class="subtitle">Smart EPL Analysis</div>
  
  <form id="authForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>
    
    <button type="submit" id="submitBtn">Login</button>
    <div id="message"></div>
  </form>
  
  <div class="toggle">
    Don't have an account? <a onclick="toggleMode()">Sign up</a>
  </div>
</div>

<script>
let isLogin = true;

document.getElementById('authForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
  
  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    const data = await res.json();
    const msgEl = document.getElementById('message');
    
    if (res.ok) {
      localStorage.setItem('token', data.token);
      msgEl.innerHTML = `<div class="success">Success! Redirecting...</div>`;
      setTimeout(() => location.href = '/dashboard', 2000);
    } else {
      msgEl.innerHTML = `<div class="error">${data.error}</div>`;
    }
  } catch (e) {
    document.getElementById('message').innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
});

function toggleMode() {
  isLogin = !isLogin;
  document.querySelector('h1').textContent = isLogin ? 'Login' : 'Sign Up';
  document.getElementById('submitBtn').textContent = isLogin ? 'Login' : 'Create Account';
  document.querySelector('.toggle a').textContent = isLogin ? 'Sign up' : 'Login';
}
</script>

</body>
</html>
